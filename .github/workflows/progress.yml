name: Update Progress

on:
  push:
    branches:
      - main

jobs:
  update-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Run progress script
        run: python .github/scripts/update_progress.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "Update progress" || echo "No changes"
          git remote set-url origin https://$PAT_TOKEN@github.com/MicheleGravagnone/dsa-exercises.git
          git push origin main
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}